<section class="section contact" id="contact">
    <div class="container">

        </div>
        <div class="contact-content">
            <div class="contact-info">
                <h3 class="contact-heading">Let's build something amazing together.</h3>
                <div class="contact-details">
                    <a href="mailto:srishtii.mukherjee@gmail.com" class="contact-item"><i class="fas fa-envelope"></i><span>srishtii.mukherjee@gmail.com</span></a>
                    <a href="tel:+918527956330" class="contact-item"><i class="fas fa-phone"></i><span>+91 8527956330</span></a>

                <div class="form-group"><textarea id="message" name="message" rows="5" placeholder="Your Message" required></textarea><label for="message">Message</label></div>
                <button type="submit" class="btn btn-primary" id="submit-btn"><span>Send Message</span><i class="fas fa-paper-plane"></i></button>

    </div>
